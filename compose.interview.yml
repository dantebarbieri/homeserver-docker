# YipitData Interview Portal (temporary)
# Remove this file and its include in docker-compose.yml when no longer needed
# Clone repo: git clone <repo-url> /srv/docker/interview-workspace

services:
  yipitdata-db:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: yipitdata-db
    image: postgres:17-alpine
    networks:
      - interview
    environment:
      POSTGRES_USER: yipitdata
      POSTGRES_PASSWORD: yipitdata
      POSTGRES_DB: yipitdata
    volumes:
      - yipitdata-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yipitdata"]
      interval: 5s
      timeout: 3s
      retries: 5

  yipitdata-backend:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: yipitdata-backend
    image: yipitdata-backend
    build:
      context: ../interview-workspace/backend
    networks:
      interview:
        aliases:
          - backend
    environment:
      DATABASE_URL: postgresql+asyncpg://yipitdata:yipitdata@yipitdata-db:5432/yipitdata
      CORS_ORIGINS: https://yipitdata.danteb.com
      SEED_ON_BOOT: "true"
      SEED_RESET: "false"
    volumes:
      - ../interview-workspace/data:/app/data:ro
    depends_on:
      yipitdata-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  yipitdata-frontend:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: yipitdata-frontend
    image: yipitdata-frontend
    build:
      context: ../interview-workspace/frontend
      args:
        VITE_BACKEND_URL: https://yipitdata.danteb.com
        VITE_MCP_URL: https://yipitdata.danteb.com/mcp
    networks:
      interview:
      proxy:
        aliases:
          - yipitdata-frontend
    depends_on:
      yipitdata-backend:
        condition: service_healthy

networks:
  proxy:
  interview:

volumes:
  yipitdata-pgdata:
