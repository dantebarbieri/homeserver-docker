# Nextcloud cloud storage stack
# nextcloud, nextcloud_cron, nextcloud_postgres, nextcloud_redis

services:
  nextcloud:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: nextcloud
    image: nextcloud:apache
    networks:
      - proxy
      - nextcloud
    environment:
      TZ: ${TZ}
      POSTGRES_HOST: nextcloud_postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      REDIS_HOST: nextcloud_redis
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_HOSTNAME}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_HOSTNAME} nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_DATA_DIR: /data
      NEXTCLOUD_INIT_HTACCESS: "true"
      PHP_MEMORY_LIMIT: 1G
      PHP_UPLOAD_LIMIT: 16G
      APACHE_BODY_LIMIT: 0
    volumes:
      - ${DATA}/nextcloud/html:/var/www/html
      - ${RAID}/nextcloud:/data
    depends_on:
      nextcloud_postgres:
        condition: service_healthy
      nextcloud_redis:
        condition: service_healthy

  nextcloud_cron:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: nextcloud_cron
    image: nextcloud:apache
    networks:
      - nextcloud
    entrypoint: /cron.sh
    environment:
      POSTGRES_HOST: nextcloud_postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      REDIS_HOST: nextcloud_redis
    volumes:
      - ${DATA}/nextcloud/html:/var/www/html
      - ${RAID}/nextcloud:/data
    depends_on:
      - nextcloud

  nextcloud_postgres:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: nextcloud_postgres
    image: postgres:16-alpine
    networks:
      - nextcloud
    volumes:
      - nextcloud-pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud_redis:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: nextcloud_redis
    image: redis:7-alpine
    networks:
      - nextcloud
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
  nextcloud:

volumes:
  nextcloud-pgdata:
