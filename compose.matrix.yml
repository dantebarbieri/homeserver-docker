# Matrix communication stack
# synapse, synapse_postgres, element, coturn

services:
  synapse:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: synapse
    image: matrixdotorg/synapse:latest
    networks:
      - matrix
      - proxy
    environment:
      TZ: ${TZ}
    volumes:
      - ${DATA}/synapse/data:/data
    depends_on:
      synapse_postgres:
        condition: service_healthy

  synapse_postgres:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: synapse_postgres
    image: postgres:16-alpine
    networks:
      - matrix
    volumes:
      - synapse-storage:/var/lib/postgresql/data
    shm_size: 128mb
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  element:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: element
    image: vectorim/element-web:latest
    networks:
      - proxy
    volumes:
      - ${DATA}/element/config.json:/app/config.json:ro

  coturn:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: coturn
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ${DATA}/coturn/turnserver.conf:/etc/turnserver.conf:ro
      - ${DATA}/nginxproxymanager/letsencrypt/live/npm-2/fullchain.pem:/etc/coturn/fullchain.pem:ro
      - ${DATA}/nginxproxymanager/letsencrypt/live/npm-2/privkey.pem:/etc/coturn/privkey.pem:ro

networks:
  proxy:
  matrix:

volumes:
  synapse-storage:
